function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultState()}catch{return defaultState()}}

function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function setVoiceDebug(message,isError=false){
  const box=document.getElementById('voiceDebug');
  box.innerHTML=message;
  box.classList.add('open');
  box.classList.toggle('err',!!isError);
}
function clearVoiceDebug(){
  const box=document.getElementById('voiceDebug');
  box.classList.remove('open','err');
  box.innerHTML='';
}
function setMicroStatus(active,text){
  const micDot=document.getElementById('micDot');
  const micText=document.getElementById('micStatusText');
  const micBtn=document.getElementById('micBtn');
  if(active){
    micDot.classList.remove('off');
    micDot.classList.add('recording');
    micBtn.classList.add('active');
    micText.innerHTML=text||'Micro actif<br><small>Écoute en cours...</small>';
  }else{
    micDot.classList.add('off');
    micDot.classList.remove('recording');
    micBtn.classList.remove('active');
    micText.innerHTML=text||'Micro inactif<br><small>Dictée navigateur</small>';
  }
}

function getSpeechRecognitionConstructor(){
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function explainSpeechError(code){
  const map={
    "no-speech":"Aucune voix détectée. Clique à nouveau et parle directement.",
    "audio-capture":"Micro indisponible ou déjà utilisé par une autre application.",
    "not-allowed":"Micro refusé. Autorise le micro dans le cadenas à gauche de l’URL.",
    "service-not-allowed":"Service de dictée bloqué par le navigateur.",
    "network":"Erreur réseau du service vocal Chrome.",
    "aborted":"Dictée arrêtée.",
    "language-not-supported":"Langue non supportée.",
    "bad-grammar":"Erreur dictée."
  };
  return map[code] || `Erreur dictée : ${code || "inconnue"}`;
}

function toggleVoice(){
  const SpeechRecognition=getSpeechRecognitionConstructor();
  const input=document.getElementById('userInput');

  if(!SpeechRecognition){
    setVoiceDebug("<b>Dictée indisponible :</b> navigateur non compatible.",true);
    return;
  }

  if(isRecording && recognition){
    try{recognition.stop()}catch(e){}
    return;
  }

  try{
    if(recognition){
      try{recognition.abort()}catch(e){}
      recognition=null;
    }

    clearVoiceDebug();

    recognition=new SpeechRecognition();
    recognition.lang="fr-FR";
    recognition.continuous=false;
    recognition.interimResults=true;
    recognition.maxAlternatives=1;

    isRecording=true;
    voiceBaseText=input.value.trim();
    voiceFinalText="";

    setMicroStatus(true,'Micro actif<br><small>Parle maintenant...</small>');
    setVoiceDebug("<b>Dictée active :</b> parle maintenant.");

    const safetyTimer=setTimeout(()=>{
      if(isRecording && recognition){
        try{recognition.stop()}catch(e){}
      }
    },9000);

    recognition.onresult=(event)=>{
      let interim="";
      for(let i=event.resultIndex;i<event.results.length;i++){
        const txt=event.results[i][0].transcript;
        if(event.results[i].isFinal){
          voiceFinalText+=" "+txt;
        }else{
          interim+=" "+txt;
        }
      }

      const full=(voiceBaseText+" "+voiceFinalText+" "+interim).replace(/\s+/g," ").trim();
      input.value=full;
      setVoiceDebug("<b>Texte capté :</b> "+escapeHtml(full||"en attente..."));
    };

    recognition.onerror=(event)=>{
      clearTimeout(safetyTimer);
      isRecording=false;
      setMicroStatus(false,'Micro erreur<br><small>Voir diagnostic</small>');
      setVoiceDebug("<b>Erreur dictée :</b> "+escapeHtml(explainSpeechError(event.error)),true);
      recognition=null;
    };

    recognition.onend=()=>{
      clearTimeout(safetyTimer);
      isRecording=false;
      setMicroStatus(false);

      if(input.value.trim()){
        setVoiceDebug("<b>Dictée terminée :</b> texte prêt dans la barre.");
      }else{
        setVoiceDebug("<b>Dictée terminée :</b> aucun texte capté. Réessaie en parlant juste après le clic.",true);
      }

      recognition=null;
      input.focus();
    };

    recognition.start();

  }catch(e){
    isRecording=false;
    recognition=null;
    setMicroStatus(false,'Micro bloqué<br><small>Voir diagnostic</small>');
    setVoiceDebug("<b>Blocage vocal :</b> "+escapeHtml(e.message||String(e)),true);
  }
}

async function handleImagePick(e){
  const file=e.target.files[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){alert('Fichier image uniquement.');return}
  pendingImage=await compressImage(file);
  renderImagePreview();
  e.target.value='';
}
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=1200;
        let w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max}
        else if(h>w&&h>max){w=Math.round(w*max/h);h=max}
        else if(w>max){w=max;h=max}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.82);
        resolve({name:file.name,size:Math.round(dataUrl.length*0.75),dataUrl});
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

${today}

RÈGLES GLOBALES :
- Réponds en français, avec structure claire.
- Ne promets jamais de gains.
- Distingue toujours : fait, analyse, scénario, risque.
- Ne jamais inventer une donnée récente.
- Ne jamais présenter une donnée ancienne comme actuelle.
- Si une image est fournie, analyse-la précisément et relie-la au contexte demandé.
- Si tu n’as pas les données live, dis clairement : "Je n’ai pas la donnée live dans le contexte fourni."
- Toujours adapter l’analyse au contexte ACTUEL (${today}).

MÉMOIRE LOCALE UTILE :
${mem||'Aucune.'}`;

  return [
    {role:'system',content:sys},
    ...state.messages.filter(m=>!m.loading).slice(-16).map(m=>{
      if(m.role==='user'&&m.imageDataUrl){
        return {role:'user',content:[{type:'text',text:m.content||'Analyse cette image.'},{type:'image_url',image_url:m.imageDataUrl}]};
      }
      return {role:m.role,content:m.content};
    })
  ];
}

async function sendMessage(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text&&!pendingImage)return;

  if(isRecording && recognition){
    try{recognition.stop()}catch(e){}
  }

  const imageToSend=pendingImage;
  const userContent=text || "Analyse cette image.";
  state.messages.push({role:'user',content:userContent,imageDataUrl:imageToSend?.dataUrl||null,ts:Date.now()});
  input.value='';
  clearPendingImage();
  clearVoiceDebug();
  renderChat();save();

  state.messages.push({role:'assistant',content:'Forge en cours…',ts:Date.now(),loading:true});
  renderChat();

  try{
    const modelToUse=imageToSend ? VISION_MODEL : state.model;
    const res=await fetch(WORKER_AI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:modelToUse,messages:buildMessages(),temperature:agent().temp,max_tokens:4096,top_p:.95})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||data.message||'Erreur Worker');
    const reply=data.choices?.[0]?.message?.content||data.reply||'Aucune réponse.';
    state.messages=state.messages.filter(m=>!m.loading);
    state.messages.push({role:'assistant',content:reply,ts:Date.now()});
    save();renderChat();
  }catch(e){
    state.messages=state.messages.filter(m=>!m.loading);
    state.messages.push({role:'assistant',content:'⚠ Erreur : '+e.message,ts:Date.now()});
    save();renderChat();
  }
}
