        <li>Un compte est personnel et non transférable.</li>

      <p><strong>Formation :</strong> contenu éducatif — ne constitue pas un conseil personnalisé.</p>
      <p><strong>Robot Access :</strong> licence individuelle liée à un compte — l'EA MT5 exécute des signaux émis par le Worker ; vous restez seul responsable de votre capital et de votre broker.</p>
      <p><strong>Signal Public :</strong> aperçu hebdomadaire sans exécution automatique.</p>

      <h2>5. Propriété intellectuelle</h2>
      <p>Toute copie, revente, redistribution des modules, replays ou signaux est interdite. Interdiction de reverse-engineering du Worker ou de l'EA.</p>

      <h2>6. Comportement</h2>
      <p>Interdit : spam, harcèlement, contenu illégal sur Discord/lives, tentative d'intrusion, scraping massif, contournement des contrôles d'accès.</p>

      <h2>7. Disponibilité</h2>
      <p>TORINVEST s'efforce d'assurer la disponibilité du site et du Worker sans garantie d'uptime 100 %. Maintenance, pannes broker, ou force majeure peuvent interrompre les services.</p>

      <h2>8. Limitation de responsabilité</h2>
      <p>TORINVEST ne saurait être tenu responsable des pertes financières liées au trading, à l'utilisation de l'EA, ou à une mauvaise interprétation des contenus. Voir <a href="/la-forge/legal/avertissement-risques.html">Avertissement risques</a>.</p>
