  <script>
    document.querySelector("[data-legal-date]").textContent = FORGE_LEGAL.lastUpdate;
    initLegalPage("Mentions légales", `

        <li><strong>SIRET :</strong> ${FORGE_LEGAL.editor.siret}</li>
        <li><strong>TVA :</strong> ${FORGE_LEGAL.editor.tva}</li>
        <li><strong>Directeur de publication :</strong> ${FORGE_LEGAL.editor.director}</li>

        <li><strong>Application formation (espace membre) :</strong> ${FORGE_LEGAL.hosting.app}</li>
        <li><strong>Worker API (MT5 EA · licences · signaux) :</strong> ${FORGE_LEGAL.hosting.worker}</li>
      </ul>

      <p>TORINVEST propose :</p>
      <ul>
        <li>Formation trading en ligne « La Forge » (${FORGE_LEGAL.offers.formation})</li>
        <li>Infrastructure Robot Access — EA MT5 connecté au Worker (${FORGE_LEGAL.offers.robotAccess})</li>
        <li>Signal Public gratuit (${FORGE_LEGAL.offers.signalPublic})</li>
        <li>Contenus éducatifs, lives, communauté Discord</li>
      </ul>
      <p><strong>Important :</strong> TORINVEST n'est pas un établissement de crédit, ni un conseiller en investissement agréé AMF (sauf mention contraire après immatriculation). Les contenus sont à visée éducative.</p>

      <h2>4. Propriété intellectuelle</h2>
      <p>L'ensemble des contenus (textes, vidéos, replays, modules, marque TORINVEST, logo La Forge) est protégé. Toute reproduction sans autorisation écrite est interdite.</p>

      <h2>5. Données personnelles</h2>
      <p>Voir la <a href="/la-forge/legal/confidentialite.html">Politique de confidentialité</a> et la page <a href="/la-forge/legal/cookies.html">Cookies</a>.</p>

      <h2>6. Litiges</h2>
      <p>Conformément à l'article L.612-1 du Code de la consommation, le consommateur peut recourir gratuitement à un médiateur de la consommation : [À COMPLÉTER — médiateur].</p>
      <p>Droit applicable : droit français. Tribunaux compétents : [À COMPLÉTER — juridiction].</p>
    `);
