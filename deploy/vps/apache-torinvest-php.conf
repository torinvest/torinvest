# Exemple VirtualHost Apache — VPS OVH (partie PHP uniquement)
# Copier vers /etc/apache2/sites-available/torinvest-php.conf
# puis : sudo a2ensite torinvest-php && sudo systemctl reload apache2
#
# Prérequis : PHP 8.x, php-sqlite3, php-curl, php-mbstring
# DNS : radar.torinvest-trading.com → IP du VPS

<VirtualHost *:443>
    ServerName radar.torinvest-trading.com
    DocumentRoot /var/www/torinvest

    <Directory /var/www/torinvest>
        AllowOverride All
        Require all granted
    </Directory>

    # CORS : autoriser le site Netlify à appeler les APIs PHP
    <LocationMatch "^/api/">
        Header set Access-Control-Allow-Origin "https://www.torinvest-trading.com"
        Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
        Header set Access-Control-Allow-Headers "Content-Type"
    </LocationMatch>

    SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/radar.torinvest-trading.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/radar.torinvest-trading.com/privkey.pem
</VirtualHost>

# Déployer sur le VPS uniquement :
#   /crypto-radar/   (module dashboard)
#   /api/            (solana-rpc, dev-auth, config.local.php)
# Optionnel : copier aussi forge-logo.png pour les assets du module
