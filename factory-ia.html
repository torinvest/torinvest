<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORINVEST AI Site Builder</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #0d0d0f;
      --panel2: #151515;
      --gold: #d4af37;
      --gold2: #ffcc55;
      --text: #f4f4f4;
      --muted: #9ca3af;
      --danger: #ff4b5c;
      --border: rgba(212, 175, 55, 0.28);
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 36%),
        radial-gradient(circle at bottom right, rgba(255, 75, 92, 0.08), transparent 32%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--border);
      background: rgba(5, 5, 5, 0.88);
      backdrop-filter: blur(18px);
      padding: 22px;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }

    main {
      padding: 22px;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      color: var(--gold2);
      letter-spacing: 0.06em;
    }

    .pill {
      border: 1px solid var(--border);
      color: var(--gold2);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(212, 175, 55, 0.06);
    }

    .group {
      background: rgba(17, 17, 18, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .group h2 {
      margin: 0 0 14px;
      font-size: 14px;
      color: var(--gold2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    label {
      display: block;
      margin: 12px 0 7px;
      color: #e5e7eb;
      font-size: 13px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.09);
      background: #09090b;
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .check {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: #09090b;
      font-size: 13px;
    }

    .check input {
      width: auto;
      margin: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 13px;
      padding: 13px 15px;
      font-weight: 800;
      cursor: pointer;
      color: #050505;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button.secondary {
      background: #171717;
      color: var(--gold2);
      border: 1px solid var(--border);
    }

    button.danger {
      background: rgba(255,75,92,0.18);
      color: #fff;
      border: 1px solid rgba(255,75,92,0.35);
    }

    .preview-shell {
      height: calc(100vh - 44px);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      background: white;
      box-shadow: var(--shadow);
    }

    .topbar {
      height: 46px;
      background: #101010;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .dots {
      display: flex;
      gap: 7px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #555;
    }

    .urlbar {
      color: #aaa;
      font-size: 12px;
    }

    iframe {
      width: 100%;
      height: calc(100% - 46px);
      border: none;
      background: #fff;
    }

    .code-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99;
      padding: 24px;
    }

    .code-box {
      width: min(1100px, 100%);
      max-height: 86vh;
      background: #080808;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .code-box textarea {
      height: 62vh;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre;
    }

    @media(max-width: 1050px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        max-height: none;
        position: relative;
      }

      .preview-shell {
        height: 780px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>TORINVEST BUILDER</h1>
        <span class="pill">LIVE BUILDER</span>
      </div>

      <div class="group">
        <h2>Identité</h2>
        <label>Nom du site</label>
        <input id="siteName" value="TORINVEST AI EXECUTOR" />

        <label>Slogan</label>
        <input id="tagline" value="La force d’un esprit libre" />

        <label>Pitch principal</label>
        <textarea id="pitch">Une plateforme intelligente pensée pour analyser, structurer et exécuter avec discipline dans un environnement de marché complexe.</textarea>

        <div class="row">
          <div>
            <label>Template</label>
            <select id="template">
              <option value="premium">Premium sombre</option>
              <option value="startup">Startup moderne</option>
              <option value="agency">Agence / service</option>
              <option value="course">Formation</option>
            </select>
          </div>
          <div>
            <label>Couleur</label>
            <input id="mainColor" type="color" value="#d4af37" />
          </div>
        </div>
      </div>

      <div class="group">
        <h2>Contenu</h2>
        <label>CTA principal</label>
        <input id="cta" value="Découvrir l’offre" />

        <label>Lien CTA</label>
        <input id="ctaLink" value="#pricing" />

        <label>Offre / Produit</label>
        <input id="offer" value="TORINVEST AI EXECUTOR" />

        <label>Prix ou accroche</label>
        <input id="price" value="Offre de lancement disponible" />
      </div>

      <div class="group">
        <h2>Sections visibles</h2>
        <div class="check-grid">
          <label class="check"><input type="checkbox" id="sFeatures" checked /> Avantages</label>
          <label class="check"><input type="checkbox" id="sProcess" checked /> Process</label>
          <label class="check"><input type="checkbox" id="sPricing" checked /> Offre</label>
          <label class="check"><input type="checkbox" id="sFaq" checked /> FAQ</label>
          <label class="check"><input type="checkbox" id="sTestimonials" checked /> Témoignages</label>
          <label class="check"><input type="checkbox" id="sContact" checked /> Contact</label>
        </div>
      </div>

      <div class="group">
        <h2>Options</h2>
        <label>Style du bouton</label>
        <select id="buttonStyle">
          <option value="rounded">Arrondi premium</option>
          <option value="sharp">Carré institutionnel</option>
          <option value="pill">Pilule moderne</option>
        </select>

        <label>Ton du site</label>
        <select id="tone">
          <option value="premium">Premium</option>
          <option value="aggressive">Impact commercial</option>
          <option value="educational">Pédagogique</option>
        </select>
      </div>

      <div class="actions">
        <button onclick="refreshPreview()">Générer</button>
        <button class="secondary" onclick="openCode()">Voir code</button>
        <button class="secondary" onclick="downloadHTML()">Exporter HTML</button>
        <button class="danger" onclick="resetForm()">Reset</button>
      </div>
    </aside>

    <main>
      <div class="preview-shell">
        <div class="topbar">
          <div class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div class="urlbar">preview://site-generated-by-torinvest-builder</div>
          <div class="pill">LIVE PREVIEW</div>
        </div>
        <iframe id="preview"></iframe>
      </div>
    </main>
  </div>

  <div class="code-modal" id="codeModal">
    <div class="code-box">
      <div class="brand">
        <h1>Code HTML généré</h1>
        <button class="secondary" onclick="closeCode()">Fermer</button>
      </div>
      <textarea id="codeOutput"></textarea>
      <div class="actions">
        <button onclick="copyCode()">Copier le code</button>
        <button class="secondary" onclick="downloadHTML()">Télécharger index.html</button>
      </div>
    </div>
  </div>

<script>
  let generatedHTML = "";

  const $ = (id) => document.getElementById(id);

  function escapeHTML(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function getButtonRadius(style) {
    if (style === "sharp") return "8px";
    if (style === "pill") return "999px";
    return "16px";
  }

  function getToneText(tone) {
    if (tone === "aggressive") {
      return {
        badge: "Passe au niveau supérieur",
        headline: "Transforme ton idée en produit visible, crédible et vendable.",
        sub: "Une présence digitale claire pour convertir ton audience en clients."
      };
    }

    if (tone === "educational") {
      return {
        badge: "Comprendre. Structurer. Avancer.",
        headline: "Un espace clair pour présenter ton savoir, ton offre et ta méthode.",
        sub: "Pensé pour expliquer simplement ce qui paraît complexe."
      };
    }

    return {
      badge: "Vision premium",
      headline: "Une interface sobre, puissante et orientée confiance.",
      sub: "L’essentiel est mis en avant avec une structure professionnelle."
    };
  }

  function buildGeneratedSite() {
    const siteName = escapeHTML($("siteName").value);
    const tagline = escapeHTML($("tagline").value);
    const pitch = escapeHTML($("pitch").value);
    const template = $("template").value;
    const mainColor = $("mainColor").value;
    const cta = escapeHTML($("cta").value);
    const ctaLink = escapeHTML($("ctaLink").value || "#");
    const offer = escapeHTML($("offer").value);
    const price = escapeHTML($("price").value);
    const radius = getButtonRadius($("buttonStyle").value);
    const tone = getToneText($("tone").value);

    const lightMode = template === "startup";
    const agencyMode = template === "agency";
    const courseMode = template === "course";

    const bg = lightMode ? "#f7f7f4" : "#050505";
    const surface = lightMode ? "#ffffff" : "#101010";
    const text = lightMode ? "#111111" : "#f7f7f7";
    const muted = lightMode ? "#555555" : "#a1a1aa";
    const border = lightMode ? "rgba(0,0,0,0.10)" : "rgba(255,255,255,0.10)";

    const features = $("sFeatures").checked ? `
      <section id="features">
        <div class="section-head">
          <span>${agencyMode ? "Expertise" : courseMode ? "Pédagogie" : "Avantages"}</span>
          <h2>Une structure pensée pour inspirer confiance.</h2>
          <p>Le site présente clairement la valeur, le mécanisme et le passage à l’action.</p>
        </div>
        <div class="grid three">
          <div class="card"><h3>Clarté</h3><p>Un message direct pour que le visiteur comprenne immédiatement ce que tu proposes.</p></div>
          <div class="card"><h3>Crédibilité</h3><p>Une mise en page premium qui renforce la perception professionnelle du projet.</p></div>
          <div class="card"><h3>Conversion</h3><p>Des appels à l’action visibles pour guider naturellement vers l’offre.</p></div>
        </div>
      </section>` : "";

    const process = $("sProcess").checked ? `
      <section id="process">
        <div class="section-head">
          <span>Méthode</span>
          <h2>Un parcours simple en 3 étapes.</h2>
        </div>
        <div class="steps">
          <div><b>01</b><h3>Découverte</h3><p>Le visiteur comprend ton univers, ton positionnement et ton objectif.</p></div>
          <div><b>02</b><h3>Preuve</h3><p>Tu présentes ta méthode, tes avantages et les raisons de te faire confiance.</p></div>
          <div><b>03</b><h3>Action</h3><p>Le site pousse vers le contact, l’inscription, l’achat ou la prise de rendez-vous.</p></div>
        </div>
      </section>` : "";

    const testimonials = $("sTestimonials").checked ? `
      <section id="testimonials">
        <div class="section-head">
          <span>Retours</span>
          <h2>Ce que les utilisateurs peuvent ressentir.</h2>
        </div>
        <div class="grid two">
          <div class="quote">“Une présentation claire, propre et professionnelle. On comprend rapidement l’offre.”<small>— Utilisateur test</small></div>
          <div class="quote">“Le site donne une image sérieuse et premium dès les premières secondes.”<small>— Client potentiel</small></div>
        </div>
      </section>` : "";

    const pricing = $("sPricing").checked ? `
      <section id="pricing">
        <div class="pricing">
          <div>
            <span>Offre</span>
            <h2>${offer}</h2>
            <p>${price}</p>
          </div>
          <a class="btn" href="${ctaLink}">${cta}</a>
        </div>
      </section>` : "";

    const faq = $("sFaq").checked ? `
      <section id="faq">
        <div class="section-head">
          <span>FAQ</span>
          <h2>Questions fréquentes</h2>
        </div>
        <details open><summary>À qui s’adresse cette offre ?</summary><p>Aux personnes qui veulent une solution claire, structurée et professionnelle.</p></details>
        <details><summary>Est-ce modifiable ?</summary><p>Oui. Le code HTML généré peut être modifié, hébergé ou intégré dans un projet plus large.</p></details>
        <details><summary>Peut-on ajouter une IA ?</summary><p>Oui. Cette base peut ensuite être connectée à une API IA pour générer automatiquement textes, sections et pages.</p></details>
      </section>` : "";

    const contact = $("sContact").checked ? `
      <section id="contact">
        <div class="contact">
          <h2>Prêt à commencer ?</h2>
          <p>Présente ton offre, ton produit ou ta communauté avec une page claire et premium.</p>
          <a class="btn" href="${ctaLink}">${cta}</a>
        </div>
      </section>` : "";

    return `<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${siteName}</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: ${bg};
      color: ${text};
    }
    body:before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top left, ${mainColor}33, transparent 35%), radial-gradient(circle at bottom right, ${mainColor}18, transparent 35%);
      pointer-events: none;
      z-index: -1;
    }
    a { color: inherit; text-decoration: none; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 7vw;
      background: ${lightMode ? "rgba(247,247,244,0.86)" : "rgba(5,5,5,0.82)"};
      backdrop-filter: blur(18px);
      border-bottom: 1px solid ${border};
    }
    .logo {
      font-weight: 900;
      letter-spacing: 0.08em;
      color: ${mainColor};
    }
    nav { display: flex; gap: 22px; font-size: 14px; color: ${muted}; }
    .hero {
      min-height: 82vh;
      display: grid;
      place-items: center;
      padding: 80px 7vw;
      text-align: center;
    }
    .hero-inner { max-width: 980px; }
    .badge {
      display: inline-flex;
      border: 1px solid ${mainColor}66;
      color: ${mainColor};
      background: ${mainColor}14;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 22px;
    }
    h1 {
      font-size: clamp(42px, 8vw, 92px);
      line-height: 0.95;
      margin: 0 0 20px;
      letter-spacing: -0.06em;
    }
    .gradient {
      background: linear-gradient(135deg, ${text}, ${mainColor});
      -webkit-background-clip: text;
      color: transparent;
    }
    .lead {
      color: ${muted};
      font-size: clamp(17px, 2vw, 23px);
      line-height: 1.65;
      max-width: 820px;
      margin: 0 auto 34px;
    }
    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, ${mainColor}, #fff1a8);
      color: #050505;
      padding: 16px 26px;
      border-radius: ${radius};
      font-weight: 900;
      box-shadow: 0 20px 60px ${mainColor}33;
    }
    .btn.secondary {
      background: transparent;
      color: ${text};
      border: 1px solid ${border};
      box-shadow: none;
    }
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    section { padding: 80px 7vw; }
    .section-head { max-width: 760px; margin-bottom: 34px; }
    .section-head span, section span {
      color: ${mainColor};
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
    }
    h2 { font-size: clamp(32px, 4vw, 56px); line-height: 1; margin: 12px 0; letter-spacing: -0.04em; }
    .section-head p, .card p, .steps p, .pricing p, .contact p, details p { color: ${muted}; line-height: 1.7; }
    .grid { display: grid; gap: 22px; }
    .three { grid-template-columns: repeat(3, 1fr); }
    .two { grid-template-columns: repeat(2, 1fr); }
    .card, .quote, details {
      background: ${surface};
      border: 1px solid ${border};
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.16);
    }
    .card h3 { color: ${mainColor}; font-size: 24px; }
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      counter-reset: step;
    }
    .steps div {
      background: ${surface};
      border: 1px solid ${border};
      border-radius: 26px;
      padding: 28px;
    }
    .steps b { color: ${mainColor}; font-size: 34px; }
    .quote { font-size: 22px; line-height: 1.5; }
    .quote small { display: block; color: ${muted}; margin-top: 18px; font-size: 14px; }
    .pricing, .contact {
      background: linear-gradient(135deg, ${surface}, ${mainColor}18);
      border: 1px solid ${mainColor}66;
      border-radius: 34px;
      padding: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }
    details { margin-bottom: 14px; }
    summary { cursor: pointer; font-weight: 900; color: ${mainColor}; }
    footer {
      padding: 34px 7vw;
      border-top: 1px solid ${border};
      color: ${muted};
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    @media(max-width: 850px) {
      header { flex-direction: column; gap: 15px; }
      nav { flex-wrap: wrap; justify-content: center; }
      .three, .two, .steps { grid-template-columns: 1fr; }
      .pricing, .contact { flex-direction: column; align-items: flex-start; }
      .hero { min-height: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">${siteName}</div>
    <nav>
      <a href="#features">Avantages</a>
      <a href="#process">Méthode</a>
      <a href="#pricing">Offre</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <div class="badge">${tone.badge}</div>
        <h1><span class="gradient">${siteName}</span></h1>
        <p class="lead"><strong>${tagline}</strong><br>${pitch}</p>
        <p class="lead">${tone.headline}<br>${tone.sub}</p>
        <div class="hero-actions">
          <a href="${ctaLink}" class="btn">${cta}</a>
          <a href="#features" class="btn secondary">Voir la méthode</a>
        </div>
      </div>
    </section>

    ${features}
    ${process}
    ${testimonials}
    ${pricing}
    ${faq}
    ${contact}
  </main>

  <footer>
    <div>© ${new Date().getFullYear()} ${siteName}. Tous droits réservés.</div>
    <div>${tagline}</div>
  </footer>
</body>
</html>`;
  }

  function refreshPreview() {
    generatedHTML = buildGeneratedSite();
    const iframe = $("preview");
    iframe.srcdoc = generatedHTML;
    $("codeOutput").value = generatedHTML;
  }

  function openCode() {
    refreshPreview();
    $("codeModal").style.display = "flex";
  }

  function closeCode() {
    $("codeModal").style.display = "none";
  }

  async function copyCode() {
    refreshPreview();
    try {
      await navigator.clipboard.writeText(generatedHTML);
      alert("Code copié.");
    } catch (e) {
      $("codeOutput").select();
      document.execCommand("copy");
      alert("Code copié.");
    }
  }

  function downloadHTML() {
    refreshPreview();
    const blob = new Blob([generatedHTML], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "index.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function resetForm() {
    $("siteName").value = "TORINVEST AI EXECUTOR";
