<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TORINVEST AI Builder</title>
  <style>
    :root {
      --bg: #030407;
      --panel: rgba(13, 15, 22, 0.94);
      --panel-2: rgba(18, 20, 29, 0.92);
      --panel-3: rgba(8, 10, 15, 0.96);
      --line: rgba(255, 255, 255, 0.08);
      --line-gold: rgba(255, 180, 0, 0.38);
      --gold: #ffb400;
      --gold-2: #ffd36a;
      --red: #ff4b5c;
      --green: #16d16b;
      --text: #f5f5f7;
      --muted: #9a9aad;
      --muted-2: #6f7283;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.58);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 13px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 180, 0, 0.16), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(255, 75, 92, 0.10), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(255, 180, 0, 0.08), transparent 34%),
        #030407;
      overflow: hidden;
    }

    a { color: inherit; text-decoration: none; }

    .app-shell {
      height: 100vh;
      padding: 14px;
      display: grid;
      grid-template-rows: 58px 1fr;
      gap: 14px;
    }

    .topbar {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(20, 22, 31, 0.92), rgba(10, 12, 18, 0.92));
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid var(--line-gold);
      background: radial-gradient(circle at 30% 20%, rgba(255, 211, 106, 0.35), rgba(255, 180, 0, 0.08));
      display: grid;
      place-items: center;
      color: var(--gold);
      box-shadow: 0 0 24px rgba(255, 180, 0, 0.16);
      font-weight: 900;
    }

    .brand-title {
      line-height: 1.05;
    }

    .brand-title strong {
      display: block;
      color: var(--gold-2);
      letter-spacing: 0.12em;
      font-size: 13px;
    }

    .brand-title span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .nav-btn {
      height: 42px;
      padding: 0 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      border-radius: 14px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s ease;
      position: relative;
    }

    .nav-btn:hover,
    .nav-btn.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-btn.active::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 18px;
      right: 18px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), var(--red));
      box-shadow: 0 0 12px rgba(255, 180, 0, 0.55);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 260px;
      justify-content: flex-end;
    }

    .icon-btn,
    .primary-btn,
    .ghost-btn,
    .danger-btn {
      border: 0;
      cursor: pointer;
      border-radius: 13px;
      font-weight: 800;
      transition: 0.2s ease;
      font-family: inherit;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--gold);
      border: 1px solid transparent;
      font-size: 17px;
    }

    .icon-btn:hover {
      border-color: var(--line-gold);
      background: rgba(255, 180, 0, 0.08);
    }

    .primary-btn {
      height: 40px;
      padding: 0 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #080808;
      box-shadow: 0 14px 35px rgba(255, 180, 0, 0.26);
    }

    .ghost-btn {
      height: 40px;
      padding: 0 17px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--line-gold);
      color: var(--text);
    }

    .danger-btn {
      height: 40px;
      padding: 0 17px;
      background: rgba(255, 75, 92, 0.12);
      border: 1px solid rgba(255, 75, 92, 0.35);
      color: #fff;
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .danger-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 240px minmax(460px, 1fr) 400px;
      gap: 14px;
    }

    .sidebar,
    .preview-panel,
    .code-panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(20, 22, 31, 0.88), rgba(8, 10, 15, 0.9));
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
    }

    .sidebar-section-title {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar-content {
      overflow-y: auto;
      padding: 12px;
    }

    .accordion {
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.025);
    }

    .accordion-head {
      padding: 13px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .accordion-body {
      display: none;
      padding: 0 12px 13px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .accordion.active .accordion-body { display: block; }

    .field { margin-top: 12px; }

    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(2, 3, 7, 0.82);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 11px;
      outline: none;
      font-size: 12px;
      font-family: inherit;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.10);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .check-list {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px;
      border-radius: 12px;
      background: rgba(0,0,0,.24);
      border: 1px solid rgba(255,255,255,.06);
      font-size: 12px;
      color: var(--muted);
    }

    .check-item input { width: auto; }

    .preview-panel {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .preview-toolbar {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(3, 4, 7, 0.55);
    }

    .window-dots { display: flex; gap: 7px; }
    .window-dot { width: 10px; height: 10px; border-radius: 50%; }
    .window-dot:nth-child(1){ background:#ff5f57; }
    .window-dot:nth-child(2){ background:#ffbd2e; }
    .window-dot:nth-child(3){ background:#28c840; }

    .preview-url {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(0,0,0,.20);
      padding: 7px 12px;
      border-radius: 999px;
      max-width: 55%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-badge {
      color: var(--gold);
      border: 1px solid var(--line-gold);
      background: rgba(255, 180, 0, 0.08);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .preview-wrap {
      flex: 1;
      min-height: 0;
      padding: 0;
      background:
        radial-gradient(circle at 70% 20%, rgba(255,180,0,.12), transparent 30%),
        #050506;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #050505;
      display: block;
    }

    .code-panel {
      display: flex;
      flex-direction: column;
    }

    .code-head {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .code-head h2 {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .code-box {
      flex: 1;
      min-height: 0;
      padding: 12px;
    }

    .code-box textarea {
      height: 100%;
      min-height: 100%;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre;
      color: #d7e1ff;
      background: rgba(2,3,7,.85);
      border-radius: 16px;
    }

    .code-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .back-home-btn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 650;
      text-decoration: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.13);
      color: #f5f5f7;
      backdrop-filter: blur(10px);
      transition: 0.2s ease;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }

    .back-home-btn:hover {
      background: rgba(255, 180, 0, 0.25);
      border-color: rgba(255, 180, 0, 0.6);
      transform: translateY(-2px);
      color: #fff;
    }

    @media(max-width: 1200px) {
      body { overflow: auto; }
      .app-shell { height: auto; min-height: 100vh; }
      .workspace { grid-template-columns: 1fr; }
      .sidebar, .preview-panel, .code-panel { min-height: 520px; }
      .code-panel { min-height: 620px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div class="brand-title">
          <strong>TORINVEST</strong>
          <span>AI Builder</span>
        </div>
      </div>

      <nav class="main-nav">
        <button class="nav-btn active" onclick="focusPanel('generate', this)">Générer</button>
        <button class="nav-btn" onclick="focusPanel('design', this)">Design</button>
        <button class="nav-btn" onclick="focusPanel('pages', this)">Pages</button>
        <button class="nav-btn" onclick="focusPanel('seo', this)">SEO</button>
        <button class="nav-btn" onclick="focusPanel('export', this)">Export</button>
      </nav>

      <div class="top-actions">
        <button class="icon-btn" title="Mode premium">☼</button>
        <button class="ghost-btn" onclick="refreshPreview()">Aperçu</button>
        <button class="primary-btn" onclick="downloadHTML()">Exporter</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-section-title">
          <span>Contenu</span>
          <span>⌃</span>
        </div>

        <div class="sidebar-content">
          <div class="accordion active" data-panel="generate">
            <div class="accordion-head" onclick="toggleAcc(this)">
              <span>01. Informations</span><span>⌄</span>
            </div>
            <div class="accordion-body">
              <div class="field">
                <label>Nom du site</label>
                <input id="siteName" value="TORINVEST AI EXECUTOR" />
              </div>
              <div class="field">
                <label>Slogan</label>
                <input id="tagline" value="La force d’un esprit libre" />
              </div>
              <div class="field">
                <label>Pitch principal</label>
                <textarea id="pitch">Une plateforme intelligente pensée pour analyser, structurer et exécuter avec discipline dans un environnement de marché complexe.</textarea>
              </div>
            </div>
          </div>

          <div class="accordion active" data-panel="design">
            <div class="accordion-head" onclick="toggleAcc(this)">
              <span>02. Design</span><span>⌄</span>
            </div>
            <div class="accordion-body">
              <div class="mini-grid">
                <div class="field">
                  <label>Template</label>
                  <select id="template">
                    <option value="premium">Premium sombre</option>
                    <option value="startup">Startup moderne</option>
                    <option value="agency">Agence / service</option>
                    <option value="course">Formation</option>
                  </select>
                </div>
                <div class="field">
                  <label>Couleur</label>
                  <input id="mainColor" type="color" value="#ffb400" />
                </div>
              </div>
              <div class="field">
                <label>Style du bouton</label>
                <select id="buttonStyle">
                  <option value="rounded">Arrondi premium</option>
                  <option value="sharp">Carré institutionnel</option>
                  <option value="pill">Pilule moderne</option>
                </select>
              </div>
              <div class="field">
                <label>Ton du site</label>
                <select id="tone">
                  <option value="premium">Premium</option>
                  <option value="aggressive">Impact commercial</option>
                  <option value="educational">Pédagogique</option>
                </select>
              </div>
            </div>
          </div>

          <div class="accordion active" data-panel="pages">
            <div class="accordion-head" onclick="toggleAcc(this)">
              <span>03. Sections</span><span>⌄</span>
            </div>
            <div class="accordion-body">
              <div class="check-list">
                <label class="check-item"><input type="checkbox" id="sFeatures" checked /> Avantages</label>
                <label class="check-item"><input type="checkbox" id="sProcess" checked /> Process</label>
                <label class="check-item"><input type="checkbox" id="sPricing" checked /> Offre</label>
                <label class="check-item"><input type="checkbox" id="sFaq" checked /> FAQ</label>
                <label class="check-item"><input type="checkbox" id="sTestimonials" checked /> Témoignages</label>
                <label class="check-item"><input type="checkbox" id="sContact" checked /> Contact</label>
              </div>
            </div>
          </div>

          <div class="accordion active" data-panel="seo">
            <div class="accordion-head" onclick="toggleAcc(this)">
              <span>04. Offre & SEO</span><span>⌄</span>
            </div>
            <div class="accordion-body">
              <div class="field">
                <label>CTA principal</label>
                <input id="cta" value="Découvrir l’offre" />
              </div>
              <div class="field">
                <label>Lien CTA</label>
                <input id="ctaLink" value="#pricing" />
              </div>
              <div class="field">
                <label>Offre / Produit</label>
                <input id="offer" value="TORINVEST AI EXECUTOR" />
              </div>
              <div class="field">
                <label>Prix ou accroche</label>
                <input id="price" value="Offre de lancement disponible" />
              </div>
            </div>
          </div>

          <div class="accordion active" data-panel="export">
            <div class="accordion-head" onclick="toggleAcc(this)">
              <span>05. Export</span><span>⌄</span>
            </div>
            <div class="accordion-body">
              <div class="mini-grid">
                <button class="primary-btn" onclick="refreshPreview()">Générer</button>
                <button class="ghost-btn" onclick="copyCode()">Copier</button>
                <button class="ghost-btn" onclick="downloadHTML()">HTML</button>
                <button class="danger-btn" onclick="resetForm()">Reset</button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <section class="preview-panel">
        <div class="preview-toolbar">
          <div class="window-dots">
            <span class="window-dot"></span>
            <span class="window-dot"></span>
            <span class="window-dot"></span>
          </div>
          <div class="preview-url">preview://site-generated-by-torinvest-builder</div>
          <div class="preview-badge">LIVE PREVIEW</div>
        </div>
        <div class="preview-wrap">
          <iframe id="preview"></iframe>
        </div>
      </section>

      <section class="code-panel">
        <div class="code-head">
          <h2>Code HTML</h2>
          <span class="pill">Generated</span>
        </div>
        <div class="code-box">
          <textarea id="codeOutput" spellcheck="false"></textarea>
        </div>
        <div class="code-actions">
          <button class="ghost-btn" onclick="copyCode()">Copier le code</button>
          <button class="primary-btn" onclick="downloadHTML()">Exporter</button>
        </div>
      </section>
    </div>
  </div>

  <a href="/" class="back-home-btn">← Retour accueil</a>

<script>
  let generatedHTML = "";
  const $ = (id) => document.getElementById(id);

  function escapeHTML(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function toggleAcc(head) {
    head.closest(".accordion").classList.toggle("active");
  }

  function focusPanel(panel, btn) {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const target = document.querySelector(`[data-panel="${panel}"]`);
    if (target) {
      target.classList.add("active");
      target.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }

  function getButtonRadius(style) {
    if (style === "sharp") return "8px";
    if (style === "pill") return "999px";
    return "16px";
  }

  function getToneText(tone) {
    if (tone === "aggressive") {
      return {
        badge: "Propulsé par l’IA",
        headline: "Nous créons des sites qui convertissent.",
        sub: "Des pages modernes, rapides et optimisées pour transformer une idée en business visible."
      };
    }
    if (tone === "educational") {
      return {
        badge: "Comprendre. Structurer. Avancer.",
        headline: "Un espace clair pour présenter ton savoir.",
        sub: "Pensé pour expliquer simplement ce qui paraît complexe."
      };
    }
    return {
      badge: "Propulsé par l’IA",
      headline: "Nous créons des sites qui convertissent.",
      sub: "Une interface sobre, puissante et orientée confiance."
    };
  }

  function buildGeneratedSite() {
    const siteName = escapeHTML($("siteName").value);
    const tagline = escapeHTML($("tagline").value);
    const pitch = escapeHTML($("pitch").value);
    const template = $("template").value;
    const mainColor = $("mainColor").value;
    const cta = escapeHTML($("cta").value);
    const ctaLink = escapeHTML($("ctaLink").value || "#");
    const offer = escapeHTML($("offer").value);
    const price = escapeHTML($("price").value);
    const radius = getButtonRadius($("buttonStyle").value);
    const tone = getToneText($("tone").value);
    const lightMode = template === "startup";
    const agencyMode = template === "agency";
    const courseMode = template === "course";
    const bg = lightMode ? "#f7f7f4" : "#050505";
    const surface = lightMode ? "#ffffff" : "#101010";
    const text = lightMode ? "#111111" : "#f7f7f7";
    const muted = lightMode ? "#555555" : "#a1a1aa";
    const border = lightMode ? "rgba(0,0,0,0.10)" : "rgba(255,255,255,0.10)";

    const features = $("sFeatures").checked ? `
      <section id="features">
        <div class="section-head">
          <span>${agencyMode ? "Expertise" : courseMode ? "Pédagogie" : "Avantages"}</span>
          <h2>Un site pensé pour être clair, crédible et vendeur.</h2>
          <p>Chaque bloc guide le visiteur vers la compréhension, la confiance et l’action.</p>
        </div>
        <div class="grid three">
          <div class="card"><h3>Design premium</h3><p>Une mise en page moderne, sombre et élégante.</p></div>
          <div class="card"><h3>Optimisé SEO</h3><p>Une structure propre pour Google et les moteurs de recherche.</p></div>
          <div class="card"><h3>Rapide & léger</h3><p>Un HTML exportable, simple à héberger et facile à modifier.</p></div>
        </div>
      </section>` : "";

    const process = $("sProcess").checked ? `
      <section id="process">
        <div class="section-head"><span>Méthode</span><h2>De l’idée au site prêt à publier.</h2></div>
        <div class="steps">
          <div><b>01</b><h3>Brief</h3><p>Tu renseignes ton projet, ton offre et ton positionnement.</p></div>
          <div><b>02</b><h3>Génération</h3><p>Le builder crée une page propre avec sections, CTA et design.</p></div>
          <div><b>03</b><h3>Export</h3><p>Tu récupères le code HTML et tu peux le publier.</p></div>
        </div>
      </section>` : "";

    const testimonials = $("sTestimonials").checked ? `
      <section id="testimonials">

    const pricing = $("sPricing").checked ? `

    return `<!DOCTYPE html>
<html lang="fr">
<head>

  <style>

    ${features}${process}${testimonials}${pricing}${faq}${contact}

</html>`;
  }

  function refreshPreview() {
    generatedHTML = buildGeneratedSite();
    $("preview").srcdoc = generatedHTML;
    $("codeOutput").value = generatedHTML;
  }

  async function copyCode() {
    refreshPreview();
    try {
      await navigator.clipboard.writeText(generatedHTML);
      alert("Code copié.");
    } catch (e) {
      $("codeOutput").select();
      document.execCommand("copy");
      alert("Code copié.");
    }
  }

  function downloadHTML() {
    refreshPreview();
    const blob = new Blob([generatedHTML], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "index.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function resetForm() {
    $("siteName").value = "TORINVEST AI EXECUTOR";
    $("tagline").value = "La force d’un esprit libre";
    $("pitch").value = "Une plateforme intelligente pensée pour analyser, structurer et exécuter avec discipline dans un environnement de marché complexe.";
    $("template").value = "premium";
    $("mainColor").value = "#ffb400";
    $("cta").value = "Découvrir l’offre";
    $("ctaLink").value = "#pricing";
    $("offer").value = "TORINVEST AI EXECUTOR";
    $("price").value = "Offre de lancement disponible";
    $("buttonStyle").value = "rounded";
    $("tone").value = "premium";
    ["sFeatures", "sProcess", "sPricing", "sFaq", "sTestimonials", "sContact"].forEach(id => $(id).checked = true);
    refreshPreview();
  }

  document.querySelectorAll("input, textarea, select").forEach(el => {
    el.addEventListener("input", refreshPreview);
    el.addEventListener("change", refreshPreview);
  });

  refreshPreview();
</script>
</body>
</html>
