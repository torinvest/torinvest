  <style>
    :root {
      --bg: #040407;
      --gold: #ffb400;
      --text: #f6f6f8;
      --muted: #9a9aad;
      --border: rgba(255,255,255,.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, rgba(255,180,0,.15), transparent 35%), #040407;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(420px, 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      background: rgba(10,10,16,.9);
    }
    h1 { font-size: 18px; margin-bottom: 8px; }
    p { color: var(--muted); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.4);
      color: var(--text);
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffb400, #ff4b5c);
      color: #1b1200;
      font-weight: 800;
      cursor: pointer;
    }
    .msg { margin-top: 14px; font-size: 13px; min-height: 20px; }
    .bad { color: #ff4b5c; }
    .ok { color: #15d16b; }
    a { color: var(--gold); font-size: 13px; display: inline-block; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Accès développeur Forge</h1>
    <p>Entre ton code PIN personnel pour ouvrir le terminal AI sans licence (AITORINVEST2).</p>
    <form id="devForm">
      <label for="pin">Code PIN</label>
      <input id="pin" type="password" autocomplete="off" required placeholder="Ton code personnel" />
      <button type="submit">Ouvrir le terminal</button>
    </form>
    <div class="msg" id="msg"></div>
    <a href="/">← Retour accueil</a>
  </div>

  <script>
    const STORAGE_KEY = "torinvest_dev_session";
    const TARGET = "/AITORINVEST2.html";

    document.getElementById("devForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const msg = document.getElementById("msg");
      const pin = document.getElementById("pin").value.trim();
      msg.className = "msg";
      msg.textContent = "Vérification...";

      try {
        const resp = await fetch("/api/dev-auth.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pin })
        });
        const data = await resp.json();

        if (!resp.ok || !data.ok) {
          msg.className = "msg bad";
          msg.textContent = data.error || "Accès refusé";
          return;
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          token: data.token,
          expiresAt: data.expiresAt
        }));

        msg.className = "msg ok";
        msg.textContent = "Accès accordé. Redirection...";
        setTimeout(() => { window.location.href = TARGET; }, 600);
      } catch (err) {
        msg.className = "msg bad";
        msg.textContent = "Erreur de connexion : " + err.message;
      }
    });
  </script>
</body>
